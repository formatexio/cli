name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  build:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail_fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: linux-amd64      }
          - { goos: linux,   goarch: arm64, suffix: linux-arm64      }
          - { goos: darwin,  goarch: amd64, suffix: darwin-amd64     }
          - { goos: darwin,  goarch: arm64, suffix: darwin-arm64     }
          - { goos: windows, goarch: amd64, suffix: windows-amd64.exe }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/formatexio/cli/cmd.Version=$GITHUB_REF_NAME" \
            -o "formatex-${{ matrix.suffix }}" \
            .

      - name: Upload binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" "formatex-${{ matrix.suffix }}"
